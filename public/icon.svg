<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Black rounded background -->
  <rect width="32" height="32" rx="7" fill="#000"/>

  <!-- Back document (depth hint) -->
  <rect x="10" y="4.5" width="9" height="13.5" rx="0.8"
        stroke="white" stroke-width="0.6" fill="none" opacity="0.2"/>

  <!-- Mid document -->
  <rect x="8.5" y="6" width="9" height="13.5" rx="0.8"
        stroke="white" stroke-width="0.8" fill="none" opacity="0.45"/>

  <!-- Front document -->
  <rect x="7" y="7.5" width="9" height="13.5" rx="0.8"
        stroke="white" stroke-width="1.4" fill="none"/>

  <!-- Header rule across front document -->
  <line x1="7" y1="11" x2="16" y2="11"
        stroke="white" stroke-width="1.4"/>

  <!-- Content lines -->
  <line x1="8.5" y1="13.5" x2="14.5" y2="13.5"
        stroke="white" stroke-width="1" stroke-linecap="square"/>
  <line x1="8.5" y1="16" x2="14.5" y2="16"
        stroke="white" stroke-width="0.7" stroke-linecap="square" opacity="0.55"/>
  <line x1="8.5" y1="18.5" x2="12" y2="18.5"
        stroke="white" stroke-width="0.7" stroke-linecap="square" opacity="0.3"/>

  <!-- Flow arrow -->
  <line x1="17.5" y1="14.5" x2="23.5" y2="14.5"
        stroke="white" stroke-width="1.4" stroke-linecap="square"/>
  <polygon points="21,11.5 25.5,14.5 21,17.5" fill="white"/>
</svg>
